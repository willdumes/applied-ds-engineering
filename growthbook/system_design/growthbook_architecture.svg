<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" style="background:#ffffff;font-family:monospace">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a1a2e"/>
    </marker>
    <marker id="arrow-rev" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#1a1a2e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9a3412"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="20" y="28" font-size="14" font-weight="bold" fill="#1a1a2e">End-to-end Implementation</text>

  <!-- experiment.py cloud (top center) -->
  <ellipse cx="400" cy="75" rx="90" ry="30" fill="#f8fafc" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="400" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">experiment.py</text>
  <text x="400" y="88" text-anchor="middle" font-size="10" fill="#555">(producer)</text>

  <!-- GB Frontend box (top left, dashed) -->
  <rect x="50" y="130" width="170" height="65" rx="4" fill="#f0f9ff" stroke="#0369a1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="135" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c4a6e">GB Front End</text>
  <text x="135" y="178" text-anchor="middle" font-size="12" fill="#0369a1">:3000</text>

  <!-- Kafka Broker box (top right, dashed) -->
  <rect x="580" y="110" width="180" height="70" rx="4" fill="#fdf4ff" stroke="#7e22ce" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="670" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a044e">Kafka Broker</text>
  <text x="670" y="160" text-anchor="middle" font-size="12" fill="#7e22ce">:9092</text>

  <!-- GB Backend box (middle left, dashed) -->
  <rect x="50" y="255" width="170" height="65" rx="4" fill="#f0f9ff" stroke="#0369a1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="135" y="283" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c4a6e">GB Backend</text>
  <text x="135" y="303" text-anchor="middle" font-size="12" fill="#0369a1">:3100</text>

  <!-- PostgresDB cylinder (center) -->
  <ellipse cx="400" cy="248" rx="85" ry="20" fill="#f0fdf4" stroke="#166534" stroke-width="2"/>
  <rect x="315" y="248" width="170" height="70" fill="#f0fdf4" stroke="#166534" stroke-width="2"/>
  <ellipse cx="400" cy="318" rx="85" ry="20" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="400" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">PostgresDB</text>
  <text x="400" y="305" text-anchor="middle" font-size="12" fill="#166534">:5432</text>

  <!-- Zookeeper box (bottom right) -->
  <rect x="580" y="360" width="180" height="65" rx="4" fill="#fff7ed" stroke="#9a3412" stroke-width="2"/>
  <text x="670" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c2d12">Zookeeper</text>
  <text x="670" y="408" text-anchor="middle" font-size="12" fill="#9a3412">:2181</text>

  <!-- MongoDB cylinder (bottom left) -->
  <ellipse cx="135" cy="408" rx="75" ry="17" fill="#fefce8" stroke="#854d0e" stroke-width="2"/>
  <rect x="60" y="408" width="150" height="60" fill="#fefce8" stroke="#854d0e" stroke-width="2"/>
  <ellipse cx="135" cy="468" rx="75" ry="17" fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  <text x="135" y="440" text-anchor="middle" font-size="13" font-weight="bold" fill="#713f12">MongoDB</text>
  <text x="135" y="460" text-anchor="middle" font-size="12" fill="#854d0e">:27017</text>

  <!-- Consumer.py cloud (bottom center) -->
  <ellipse cx="400" cy="415" rx="85" ry="28" fill="#f8fafc" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="400" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">consumer.py</text>
  <text x="400" y="428" text-anchor="middle" font-size="10" fill="#555">(consumer)</text>

  <!-- experiment.py → GB Backend (hits the backend, not DB) -->
  <line x1="312" y1="88" x2="180" y2="258" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ① experiment.py → Kafka Broker -->
  <line x1="490" y1="78" x2="578" y2="132" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="528" cy="98" r="10" fill="#1a1a2e"/>
  <text x="528" y="102" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">1</text>

  <!-- ② Kafka Broker → consumer.py -->
  <line x1="628" y1="180" x2="478" y2="395" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="562" cy="298" r="10" fill="#1a1a2e"/>
  <text x="562" y="302" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">2</text>

  <!-- Zookeeper ↔ Kafka Broker (dashed orange, internal coordination) -->
  <line x1="670" y1="180" x2="670" y2="358" stroke="#9a3412" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)" marker-start="url(#arrow-rev)"/>
  <text x="722" y="272" text-anchor="middle" font-size="9" fill="#9a3412">coordinates</text>

  <!-- ③ consumer.py → PostgresDB -->
  <line x1="390" y1="387" x2="382" y2="340" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="368" cy="365" r="10" fill="#1a1a2e"/>
  <text x="368" y="369" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">3</text>

  <!-- ④ PostgresDB → GB Backend -->
  <line x1="314" y1="288" x2="222" y2="288" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="268" cy="278" r="10" fill="#1a1a2e"/>
  <text x="268" y="282" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">4</text>

  <!-- ⑤ GB Backend ↔ GB Frontend (bidirectional) -->
  <line x1="135" y1="255" x2="135" y2="197" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow-rev)"/>
  <circle cx="160" cy="225" r="10" fill="#1a1a2e"/>
  <text x="160" y="229" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">5</text>

  <!-- GB Backend → MongoDB -->
  <line x1="135" y1="320" x2="135" y2="390" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
